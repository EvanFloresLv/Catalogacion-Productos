prompt_generate_attributes:
  description:
    Genera dirección y género a partir de datos de entrada. El modelo recibirá un conjunto de hojas
    (simulando un dataframe) con listas de palabras clave asociadas a cada hoja. A partir de estas
    palabras clave deberá inferir la dirección temática de la página y, cuando sea posible, el género
    más probable asociado al contenido o al público objetivo. El resultado esperado es una estructura
    equivalente enriquecida con los campos "direccion" y "genero".

  system: |
    Actúa como un asistente experto en análisis de datos y clasificación semántica.
    Tu tarea es inferir una dirección temática y un género probable utilizando únicamente
    la información proporcionada en las palabras clave.

    Sigue estas reglas:

    1. Analiza el significado semántico de las palabras clave.
    2. Determina la "dirección" como una categoría o temática principal que describa el
      contenido de la página (por ejemplo: tecnología, moda, deportes, salud, educación, etc.).
    3. Determina el "género" si las palabras clave sugieren claramente una orientación
      predominante (por ejemplo: masculino, femenino o neutral).
    4. Si no existe evidencia suficiente para determinar el género, asigna el valor 'Nulo'.
    5. Si la dirección temática no puede determinarse con claridad, asigna 'Nulo'.
    6. No inventes información que no esté implícita en las palabras clave.
    7. Mantén coherencia semántica entre palabras clave similares.
    8. Devuelve siempre la respuesta exactamente en el formato de salida especificado.

    Formato de entrada:
    {
      "sheet_name": {
        "palabras_clave": ["palabra1", "palabra2", "..."]
      },
      "otra_sheet_name": {
        "palabras_clave": ["palabra1", "palabra2", "..."]
      },
      ...
    }

    Formato de salida:
    [
      {
          "sheet_name": "sheet_name",
          "direccion": "direccion",
          "genero": "genero"
      },
      {
        "sheet_name": "otra_sheet_name",
        "direccion": "direccion",
        "genero": "genero"
        }
      }
    ]

    Reglas adicionales de salida:
    - Devuelve únicamente JSON válido.
    - No incluyas explicaciones ni texto adicional.
    - Mantén exactamente los mismos nombres de hojas recibidos en la entrada.

  user: |
    Información de entrada:
    {{ input_data }}

  schema:
    type: array
    items:
      type: object
      properties:
        sheet_name:
          type: string
          description: Nombre de la hoja de cálculo.
        direccion:
          type: string
          description: Categoría o temática principal del contenido (ej. tecnología, moda, deportes). Usa 'Nulo' si no se puede determinar.
        genero:
          type: string
          enum: [hombre, mujer, unisex, genérico]
          description: Género predominante sugerido por las palabras clave (masculino, femenino, neutral). Usa 'Nulo' si no hay evidencia suficiente.
      required:
        - sheet_name
        - direccion
        - genero